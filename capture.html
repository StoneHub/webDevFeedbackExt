<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Region Capture</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      min-height: 100vh;
    }

    .stage {
      padding: 20px;
      overflow: auto;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 35%),
        linear-gradient(180deg, #020617 0%, #111827 100%);
    }

    .frame {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 16px;
      padding: 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .image-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
      cursor: crosshair;
      user-select: none;
    }

    .image-wrap img {
      display: block;
      max-width: 100%;
      border-radius: 12px;
    }

    .selection {
      position: absolute;
      border: 2px solid #38bdf8;
      background: rgba(56, 189, 248, 0.18);
      box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.45);
      pointer-events: none;
      display: none;
    }

    .selection.visible {
      display: block;
    }

    .sidebar {
      padding: 24px;
      background: #f8fafc;
      color: #0f172a;
      border-left: 1px solid #cbd5e1;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    .lede {
      font-size: 13px;
      line-height: 1.5;
      color: #475569;
      margin-bottom: 18px;
    }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 6px;
    }

    .value {
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 12px;
      font: inherit;
    }

    textarea:focus {
      outline: 2px solid rgba(37, 99, 235, 0.25);
      border-color: #2563eb;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .status {
      font-size: 12px;
      color: #475569;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-left: none;
        border-top: 1px solid #cbd5e1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="stage">
      <div class="frame">
        <div class="image-wrap" id="image-wrap">
          <img id="screenshot-image" alt="Captured viewport screenshot">
          <div class="selection" id="selection-box"></div>
        </div>
      </div>
    </div>

    <aside class="sidebar">
      <h1>Capture Region Feedback</h1>
      <p class="lede">Drag a box over the screenshot, describe the change, and save it back into the page history.</p>

      <div class="card">
        <div class="label">Source</div>
        <div class="value" id="source-url"></div>
      </div>

      <div class="card">
        <div class="label">Selection</div>
        <div class="value" id="selection-summary">Draw a box on the screenshot.</div>
      </div>

      <div class="card">
        <div class="label">Requested Change</div>
        <textarea id="note-field" placeholder="Describe what should change in this region..."></textarea>
      </div>

      <div class="actions">
        <button class="primary" id="save-btn">Save Region Feedback</button>
        <button class="secondary" id="reset-btn">Reset Selection</button>
        <button class="danger" id="cancel-btn">Cancel</button>
      </div>

      <p class="status" id="status-line"></p>
    </aside>
  </div>

  <script src="shared.js"></script>
  <script src="capture.js"></script>
</body>
</html>
